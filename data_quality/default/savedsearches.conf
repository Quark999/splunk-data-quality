[Data Quality - Low Entropy Sources]
cron_schedule = 0 * * * *
description = Detects log sources with low event_type variety (entropy proxy) — indicates a source may be stuck sending the same repeated message.
dispatch.earliest_time = -2h
dispatch.latest_time = now
enableSched = 1
alert_type = always
alert.severity = 3
search = | tstats dc(Data_Quality.event_type) as entropy_proxy count as event_count FROM datamodel=Data_Quality.Events BY Data_Quality.index, Data_Quality.sourcetype, _time span=1h | rename Data_Quality.index as index Data_Quality.sourcetype as sourcetype | where entropy_proxy < 5 | sort - event_count
