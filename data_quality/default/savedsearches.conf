[Data Quality - Low Entropy Sources]
cron_schedule = 0 * * * *
description = Detects log sources with low punct pattern variety — indicates a source may be stuck sending the same repeated message. Uses punct as a universal entropy proxy requiring no TA.
dispatch.earliest_time = -2h
dispatch.latest_time = now
enableSched = 1
alert_type = always
alert.severity = 3
search = | tstats dc(Data_Quality.punct) as entropy_proxy count as event_count FROM datamodel=Data_Quality.Events BY index, sourcetype, _time span=1h | where entropy_proxy < 5 | sort - event_count
