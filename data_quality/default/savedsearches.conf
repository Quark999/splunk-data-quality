[Data Quality - Low Entropy Sources]
cron_schedule = 0 * * * *
description = Detects log sources with low punct pattern variety — indicates a source may be stuck sending the same repeated message. Uses punct as a universal entropy proxy requiring no TA. Excludes sourcetypes in the data_quality_exclusions lookup.
dispatch.earliest_time = -2h
dispatch.latest_time = now
enableSched = 1
alert_type = always
alert.severity = 3
search = | datamodel Data_Quality Events search | bin _time span=1h | stats dc(Events.punct) as entropy_proxy count as event_count by sourcetype, _time | lookup data_quality_exclusions sourcetype OUTPUT reason as excluded | where isnull(excluded) | where entropy_proxy < 5 | sort - event_count
